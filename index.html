<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Libro·Diario</title>

<!-- Instalable como app en el celular (Android / PWA) -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1E3D32" />

<!-- Instalable como app en iPhone (Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Libro·Diario" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />

<style>
  html, body { margin: 0; padding: 0; background: #F0EDE4; }
  #root:empty::before {
    content: 'Cargando…';
    display: flex; align-items: center; justify-content: center;
    height: 100vh; font-family: system-ui, sans-serif; color: #6B6A62; font-size: 14px;
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Firebase (para sincronizar entre los celulares de la familia) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Babel: para poder escribir la app en JSX sin paso de compilación -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Tus claves de Firebase (edita este archivo, ver LEEME.md) -->
<script src="firebase-config.js"></script>

<!-- Guardado local + sincronización familiar -->
<script src="storage.js"></script>

<!-- Iconos -->
<script src="icons.js"></script>

<!-- La app: la cargamos y transformamos a mano (en vez del escaneo automático de
     Babel) para forzar el "runtime clásico" de JSX. Las versiones nuevas de Babel
     usan por defecto el "runtime automático", que inserta un import invisible al
     principio del código y rompe los scripts clásicos que usamos aquí. -->
<script>
(async function () {
  try {
    const res = await fetch('app.jsx');
    const src = await res.text();
    const { code } = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] });
    const s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
  } catch (err) {
    document.getElementById('root').textContent = 'Error al cargar la app: ' + err.message;
    console.error(err);
  }
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').then(function (reg) {
        // Revisa si hay un sw.js más nuevo cada vez que abres o regresas a la app.
        reg.update();
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') reg.update();
        });

        // Si encuentra una versión nueva del propio sw.js, que tome control
        // de inmediato (sin esperar a cerrar todas las pestañas) y recarga
        // la página una sola vez para usarla.
        reg.addEventListener('updatefound', function () {
          var nuevo = reg.installing;
          if (!nuevo) return;
          nuevo.addEventListener('statechange', function () {
            if (nuevo.state === 'installed' && reg.waiting) {
              reg.waiting.postMessage('SKIP_WAITING');
            }
          });
        });
      }).catch(function (err) {
        console.warn('No se pudo registrar el service worker:', err);
      });

      var yaRecargo = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (yaRecargo) return;
        yaRecargo = true;
        location.reload();
      });
    });
  }
</script>
</body>
</html>
